<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
</head>
<body>

  <div class="page">
  <img src="just-eat-logo.png" alt="Just Eat Logo" class="logo" />
  <div class="container">
    <h1>Find Restaurants in UK</h1>
    <div class="form">
      <input type="text" id="postcode" placeholder="Please enter postcode" />
      <button onclick="submit()">Submit</button>
      </div>
    </div>
  </div>

  <script>
    function submit() {
      const postcode = document.getElementById('postcode').value.trim();
      if (!postcode) return;
      window.location.href = `restaurants.html?postcode=${encodeURIComponent(postcode)}`;
    }

    document.getElementById('postcode').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });
  </script>

  <style>
    body {
      background: linear-gradient(to bottom, #ffffff, #f5f5f5);
      font-family: Roboto, sans-serif;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .logo {
      width: 250px;   
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      color: #777;
      margin: 0 0 1.5rem;
    }

    .form {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: #aaa;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      background: #e66e05;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1a1a1a;
    }
  </style>

</body>
</html>
