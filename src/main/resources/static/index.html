<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
</head>
<body>

  <div class="container">
    <h1>Find Restaurants</h1>
    <div class="form">
      <input type="text" id="postcode" placeholder="Please enter postcode" />
      <button onclick="submit()">Submit</button>
    </div>
  </div>

  <script>
    function submit() {
      const postcode = document.getElementById('postcode').value.trim();
      if (!postcode) return;
      window.location.href = `restaurants.html?postcode=${encodeURIComponent(postcode)}`;
    }

    document.getElementById('postcode').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });
  </script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #111;
      margin: 0 0 8px;
    }

    p {
      font-size: 14px;
      color: #777;
      margin: 0 0 1.5rem;
    }

    .form {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: #aaa;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>

</body>
</html>
