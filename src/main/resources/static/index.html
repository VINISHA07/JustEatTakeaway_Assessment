<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-white to-gray-100 m-0 font-sans">

  <div class="flex flex-col items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl p-10 w-full max-w-md text-center shadow-lg">
      <img src="just-eat-logo.png" alt="Just Eat Logo" class="logo" />
      <h1>Find Restaurants in the UK</h1>
      <div class="flex gap-2">
        <input type="text" id="postcode" placeholder="Please enter postcode" />
        <button onclick="submit()">Submit</button>
      </div>
      <p id="error" class="error" hidden></p>
    </div>
  </div>

  <script>
    function submit() {
      const postcode = document.getElementById('postcode').value.trim();
      const error = document.getElementById('error');
      if (!postcode) {
        error.textContent = 'Please enter a postcode.';
        error.hidden = false;
        return;
      }
      error.hidden = true;
      window.location.href = `restaurants.html?postcode=${encodeURIComponent(postcode)}`;
    }

    document.getElementById('postcode').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });
  </script>

  <style>
    .logo {
      width: 250px;
      margin: 0 auto 24px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      margin-bottom: 20px;
    }

    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #c0392b;
    }


    input {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: #aaa;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      background: #e66e05;
      color: #fff;
      border: 1px solid #e66e05;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #fff;
      color: #e66e05;
    }
  </style>

</body>
</html>
