<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
</head>
<body>

  <div class="card">
    <div class="name">Detroit & waffle Republic</div>
    <div class="cuisines">Waffles,Desserts,Deals</div>
    <div class="rating">Rating: 4.5</div>
    <div class="address">
      <svg class="pin" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      57 Goodison Road, Liverpool, L4 4EJ
    </div>
  </div>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      max-width: 420px;
      width: 100%;
    }

    .name {
      font-size: 20px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .cuisines {
      font-size: 13px;
      color: #777;
      margin-bottom: 12px;
    }

    .rating {      
      font-size: 14px;
      margin-bottom: 14px;
    }
  
    .address {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 13px;
      color: #777;
    }

    .pin {
      margin-top: 2px;
      flex-shrink: 0;
    }
  </style>

</body>
</html>
