<html lang="en">
<head>
  <meta charset="UTF-8" />
</head>
<body>

        {

        },
        {
          "id": "279341",

        },
        {

        },
        {
          "id": "77571",
          "name": "Nabzys - Breck Road",

          "address": { "firstLine": "116 Oakfield Road", "city": "Liverpool", "postalCode": "L4 0UQ" },
          "rating": { "starRating": 0 },

        },
        {
          "id": "205565",
          "name": "Lukas1",
          "address": { "firstLine": "14 County Road", "city": "Liverpool", "postalCode": "L4 3QH" },

        {

          "name": "McDonald's® - Walton Rd",
          "address": { "firstLine": "202/218 Walton Road", "city": "Liverpool", "postalCode": "L4 4BB" },
          "rating": { "starRating": 3 },
          "cuisines": [{ "name": "Burgers" }, { "name": "Chicken" }, { "name": "Deals" }]
        }
      ]
    };

    const grid = document.getElementById('restaurant-grid');

    data.restaurants.forEach(r => {
      const cuisines = r.cuisines.map(c => c.name).join(' · ');
      const address = `${r.address.firstLine}, ${r.address.city}, ${r.address.postalCode}`;
      const rating = r.rating.starRating > 0 ? `Rating: ${r.rating.starRating}` : 'No rating yet';

      grid.innerHTML += `
        <div class="card">
          <div class="name">${r.name}</div>
          <div class="cuisine">${cuisines}</div>
          <div class="rating">${rating}</div>
          <div class="address">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${address}
          </div>
        </div>
      `;
    });
  </script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .cuisine {
      font-size: 12px;
      color: #777;
      margin-bottom: 8px;
    }

    .rating {
      font-size: 13px;
      color: #111;
      margin-bottom: 8px;
    }

    .address {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      font-size: 12px;
      color: #777;
    }

    .address svg {
      margin-top: 2px;
      flex-shrink: 0;
    }
  </style>

</body>
</html>
