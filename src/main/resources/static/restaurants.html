<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
</head>
<body>

  <div id="status"></div>
  <div class="grid" id="restaurant-grid"></div>

  <script>
    async function fetchRestaurants(postcode) {
      try {
        const res = await fetch(`http://localhost:8080/api/restaurants/bypostcode/${encodeURIComponent(postcode)}`);
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        const data = await res.json();

        const grid = document.getElementById('restaurant-grid');

        data.restaurants.forEach(r => {
          const cuisines = r.cuisines.map(c => c.name).join(', ');
          const address = `${r.address.firstLine}, ${r.address.city}, ${r.address.postalCode}`;
          const rating = r.rating.starRating > 0 ? `Rating: ${r.rating.starRating}` : 'No rating yet';

          grid.innerHTML += `
            <div class="card">
              <div class="name">${r.name}</div>
              <div class="cuisine">${cuisines}</div>
              <div class="rating">${rating}</div>
              <div class="address">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                ${address}
              </div>
            </div>
          `;
        });

      } catch (err) {
        document.getElementById('status').textContent = `Failed to load restaurants: ${err.message}`;
      }
    }

    const postcode = new URLSearchParams(window.location.search).get('postcode');
    fetchRestaurants(postcode);
  </script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 2rem;
    }

    #status {
      color: red;
      margin-bottom: 1rem;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .cuisine {
      font-size: 12px;
      color: #777;
      margin-bottom: 8px;
    }

    .rating {
      font-size: 13px;
      color: #111;
      margin-bottom: 8px;
    }

    .address {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      font-size: 12px;
      color: #777;
    }

    .address svg {
      margin-top: 2px;
      flex-shrink: 0;
    }
  </style>

</body>
</html>
