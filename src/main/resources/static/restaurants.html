<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
</head>
<body>
    <button id="back-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </button>
  <div id="status"></div>
  <div class="grid" id="restaurant-grid"></div>

  <template id="card-template">
    <div class="card">
      <div class="name"></div>
      <div class="cuisine"></div>
      <div class="rating"></div>
      <div class="address">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="address-text"></span>
      </div>
    </div>
  </template>

  <script>
    document.getElementById('back-button').addEventListener('click', () => {
      window.location.href = '/';
    });
    function renderRestaurants(restaurants) {
      if (restaurants.length === 0) {
        document.getElementById('status').textContent = 'No restaurants found for this postcode. Please check the postcode and try again.';
        return;
      }
      const grid = document.getElementById('restaurant-grid');
      const template = document.getElementById('card-template');
      restaurants.forEach(({ name, cuisines, address, rating }) => {
        const card = template.content.cloneNode(true);
        card.querySelector('.name').textContent = name;
        card.querySelector('.cuisine').textContent = cuisines;
        card.querySelector('.rating').textContent = rating;
        card.querySelector('.address-text').textContent = address;
        grid.appendChild(card);
      });
    }
  </script>
  <script type="module" src="restaurants.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 2rem;
    }

    #back-button {
      background: none;
      border: none;
      margin-bottom: 1rem;
    }

    #status {
      color: red;
      margin-bottom: 1rem;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .cuisine {
      font-size: 12px;
      color: #777;
      margin-bottom: 8px;
    }

    .rating {
      font-size: 13px;
      color: #111;
      margin-bottom: 8px;
    }

    .address {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      font-size: 12px;
      color: #777;
    }

    .address svg {
      margin-top: 2px;
      flex-shrink: 0;
    }
  </style>

</body>
</html>
