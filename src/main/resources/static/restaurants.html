<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

  <button id="back-button" class="mb-4 bg-transparent border-none cursor-pointer p-1 hover:bg-gray-200 rounded-full transition" onclick="window.location.href='/'">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </button>
  <div id="status" class="text-red-500 mb-4 text-sm"></div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="restaurant-grid"></div>

  <template id="card-template">
    <div class="card">
      <div class="name"></div>
      <div class="cuisine"></div>
      <div class="rating flex items-center gap-1">
        <svg class="shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span class="rating-text"></span>
      </div>
      <div class="address flex items-start gap-1.5">
        <svg class="mt-0.5 shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="address-text"></span>
      </div>
    </div>
  </template>

  <script>
    function renderRestaurants(restaurants) {
      if (restaurants.length === 0) {
        document.getElementById('status').textContent = 'No restaurants found for this postcode. Please check the postcode and try again.';
        return;
      }
      const grid = document.getElementById('restaurant-grid');
      const template = document.getElementById('card-template');
      restaurants.forEach(({ name, cuisines, address, rating }) => {
        const card = template.content.cloneNode(true);
        card.querySelector('.name').textContent = name;
        card.querySelector('.cuisine').textContent = cuisines;
        card.querySelector('.rating-text').textContent = rating;
        card.querySelector('.address-text').textContent = address;
        grid.appendChild(card);
      });
    }
  </script>
  <script type="module" src="restaurants.js"></script>

  <style>
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .name {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .cuisine {
      font-size: 12px;
      color: #777;
      margin-bottom: 8px;
    }

    .rating {
      font-size: 13px;
      color: #111;
      margin-bottom: 8px;
    }

    .rating-text {
      line-height: 14px;
    }

    .address {
      font-size: 12px;
      color: #777;
    }
  </style>

</body>
</html>
